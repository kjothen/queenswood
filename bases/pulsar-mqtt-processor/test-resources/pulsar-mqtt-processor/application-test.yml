system:
  mqtt: !include testcontainers/mqtt-test.yml
  pulsar: !include testcontainers/pulsar-all-test.yml
  postgres: !include testcontainers/postgres-test.yml
  db: !include pulsar-mqtt-processor/datasource-test.yml
  migrator:
    migrations: !system/component
      system/component-kind: migrator/migrations
      datasource: !system/ref db.datasource
      changelogs:
        - schemas/accounts/init-changelog.sql
  processor:
    datasource: !system/ref migrator.migrations
