handler: !system/required-component

interceptors: !system/component
  system/component-kind: server/interceptors
  bus: !system/ref message-bus.bus
  avro: !system/ref avro.serde
  event-channel: !keyword schemes-payments-event
  record-db: !system/ref fdb.record-db
  record-store: !system/ref fdb.meta-store
  clearbank-url: !system/ref clearbank-simulator-server.http-url

jetty-adapter: !system/component
  system/component-kind: server/jetty-adapter
  handler: !system/ref clearbank-adapter-server.handler
  interceptors: !system/ref clearbank-adapter-server.interceptors
  options: !profile
    dev:
      port: 8082
    default:
      port: 0

http-url: !system/component
  system/component-kind: server/http-url
  jetty-adapter: !system/local-ref jetty-adapter
