system:
  pulsar:
    container: !system/component
      system/component-kind: pulsar/container
      exposed-ports: [6650, 8080]

    container-service-port: !system/component
      system/component-kind: pulsar/container-service-port
      container: !system/local-ref container
      exposed-port: 6650

    container-service-url: !system/component
      system/component-kind: pulsar/container-service-url
      port: !system/local-ref container-service-port
      scheme: pulsar

    container-service-http-port: !system/component
      system/component-kind: pulsar/container-service-http-port
      container: !system/local-ref container
      exposed-port: 8080

    container-service-http-url: !system/component
      system/component-kind: pulsar/container-service-http-url
      port: !system/local-ref container-service-http-port
      scheme: http

    client: !system/component
      system/component-kind: pulsar/client
      service-url: !system/local-ref container-service-url

    admin: !system/component
      system/component-kind: pulsar/admin
      service-http-url: !system/local-ref container-service-http-url

    schemas: !system/component
      system/component-kind: pulsar/schemas
      command:
        schema: schemas/command/command-envelope.avsc.json
        type: AVRO
      command-response:
        schema: schemas/command/command-response.avsc.json
        type: AVRO

    tenants: !system/component
      system/component-kind: pulsar/tenants
      admin: !system/local-ref admin
      tenants:
        - tenant: tenant-1
          clusters: [standalone]
          roles: []

    namespaces: !system/component
      system/component-kind: pulsar/namespaces
      _: !system/local-ref tenants
      admin: !system/local-ref admin
      namespaces:
        - namespace: "tenant-1/namespace-1"
          config:
            post:
              autoTopicCreation:
                allowAutoTopicCreation: false
                defaultNumPartitions: 1
                topicType: string
              isAllowAutoUpdateSchema: false
              schemaValidationEnforced: true
            put:
              schemaCompatibilityStrategy: FULL

    topics: !system/component
      system/component-kind: pulsar/topics
      _: !system/local-ref namespaces
      admin: !system/local-ref admin
      schemas: !system/local-ref schemas
      topics:
        - topic: "persistent://tenant-1/namespace-1/topic-command"
          partitions: 1
          schema: !keyword command
        - topic: "persistent://tenant-1/namespace-1/topic-command-response"
          partitions: 1
          schema: !keyword command-response

    producers: !system/component
      system/component-kind: pulsar/producers
      command:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          accessMode: !pulsar/access-mode Shared
          schema: !keyword command
          topicName: "persistent://tenant-1/namespace-1/topic-command"
        schemas: !system/local-ref schemas
      command-response:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          accessMode: !pulsar/access-mode Shared
          schema: !keyword command-response
          topicName: "persistent://tenant-1/namespace-1/topic-command-response"
        schemas: !system/local-ref schemas

    consumers: !system/component
      system/component-kind: pulsar/consumers
      command:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          cryptoFailureAction: !pulsar/crypto-failure-action CONSUME
          schema: !pulsar/schema AUTO_CONSUME
          subscriptionName: bank-monolith-command
          subscriptionType: !pulsar/subscription-type Shared
          topicNames: ["persistent://tenant-1/namespace-1/topic-command"]
        schemas: !system/local-ref schemas
      command-response:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          cryptoFailureAction: !pulsar/crypto-failure-action CONSUME
          schema: !pulsar/schema AUTO_CONSUME
          subscriptionName: bank-monolith-command-response
          subscriptionType: !pulsar/subscription-type Shared
          topicNames:
            ["persistent://tenant-1/namespace-1/topic-command-response"]
        schemas: !system/local-ref schemas

    message-bus-producers: !system/component
      system/component-kind: pulsar/message-bus-producers
      command:
        producer: !system/local-ref producers.command
      command-response:
        producer: !system/local-ref producers.command-response

    message-bus-consumers: !system/component
      system/component-kind: pulsar/message-bus-consumers
      command:
        consumer: !system/local-ref consumers.command
      command-response:
        consumer: !system/local-ref consumers.command-response

  message-bus:
    bus: !system/component
      system/component-kind: message-bus/bus
      producers: !system/ref pulsar.message-bus-producers
      consumers: !system/ref pulsar.message-bus-consumers

  fdb: !include testcontainers/fdb-test.yml
  avro: !include avro/avro-test.yml
  command:
    watcher-handler: !system/required-component
    processor: !system/component
      system/component-kind: accounts/processor
      record-db: !system/ref fdb.record-db
      record-store: !system/ref fdb.store
      schemas: !system/ref avro.serde
    watcher: !system/component
      system/component-kind: fdb/watcher
      record-db: !system/ref fdb.record-db
      record-store: !system/ref fdb.store
      consumer-id: accounts-watcher
      store-name: accounts
      handler: !system/local-ref watcher-handler
    dispatcher: !system/component
      system/component-kind: command/dispatcher
      bus: !system/ref message-bus.bus
  server:
    handler: !system/required-component
    interceptors: !system/component
      system/component-kind: server/interceptors
      admin-api-key: !env ADMIN_API_KEY
      command-dispatcher: !system/ref command.dispatcher
      avro: !system/ref avro.serde
      record-db: !system/ref fdb.record-db
      record-store: !system/ref fdb.store
    jetty-adapter: !system/component
      system/component-kind: server/jetty-adapter
      handler: !system/ref server.handler
      interceptors: !system/ref server.interceptors
      options: !profile
        dev:
          port: 8080
