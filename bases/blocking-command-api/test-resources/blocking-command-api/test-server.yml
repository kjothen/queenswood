interceptors: !system/component
  type: server/interceptors
  mqtt-client: !system/ref mqtt.client
jetty-adapter: !system/component
  type: server/jetty-adapter
  handler: !system/required-component
  interceptors: !system/local-ref interceptors
  options:
    join?: !profile
      default: false
    port: !profile
      default: !port 0
