name: Renovate
on:
  schedule:
    - cron: "0 4 * * 0" # Sunday 4am
  workflow_dispatch: # allows manual trigger too

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: renovatebot/github-action@v41
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: debug # optional but handy initially
