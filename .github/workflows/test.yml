name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: latest

      - name: Setup Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.8'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc-gen-clojure
        run: |
          sudo curl -L https://github.com/protojure/protoc-plugin/releases/latest/download/protoc-gen-clojure -o /usr/local/bin/protoc-gen-clojure
          sudo chmod +x /usr/local/bin/protoc-gen-clojure

      - name: Install FoundationDB client library
        run: |
          curl -LO https://github.com/apple/foundationdb/releases/download/7.3.27/foundationdb-clients_7.3.27-1_amd64.deb
          sudo dpkg -i foundationdb-clients_7.3.27-1_amd64.deb

      - name: Verify Docker
        run: |
          docker --version
          docker ps

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clojure-${{ hashFiles('**/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Run tests
        env:
          TESTCONTAINERS_REUSE_ENABLE: "true"
        run: |
          clojure -X:deps prep :aliases '[:dev]'
          clojure -M:poly test :all

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: target/test-results/**/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/test-results/**/*.xml
          retention-days: 7
