system:
  server:
    port: !profile
      default: 80
      test: !port 0
    interceptors: !system/component
      kind: server/interceptors
      got: me
      this: time
    jetty-adapter: !system/component
      kind: server/jetty-adapter
      handler: !system/ref server.handler
      interceptors: !system/ref server.interceptors
      options:
        join?: false
        port: !system/ref server.port
