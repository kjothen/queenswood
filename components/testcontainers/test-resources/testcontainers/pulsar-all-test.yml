# Complete Pulsar testcontainer setup with all common components
# Includes: container, admin, client, tenants, namespaces, schemas, topics,
# crypto (key generators, readers), producer, consumer, and reader

# Testcontainer and basic Pulsar components
container: !system/component
  system/component-kind: pulsar/container
  exposed-ports: [6650, 8080]

container-service-port: !system/component
  system/component-kind: pulsar/container-service-port
  container: !system/local-ref container
  exposed-port: 6650

container-service-url: !system/component
  system/component-kind: pulsar/container-service-url
  port: !system/local-ref container-service-port
  scheme: pulsar

container-service-http-port: !system/component
  system/component-kind: pulsar/container-service-http-port
  container: !system/local-ref container
  exposed-port: 8080

container-service-http-url: !system/component
  system/component-kind: pulsar/container-service-http-url
  port: !system/local-ref container-service-http-port
  scheme: http

admin: !system/component
  system/component-kind: pulsar/admin
  service-http-url: !system/local-ref container-service-http-url

client: !system/component
  system/component-kind: pulsar/client
  service-url: !system/local-ref container-service-url

# Tenants
tenants: !system/component
  system/component-kind: pulsar/tenants
  admin: !system/local-ref admin
  tenants:
    - tenant: tenant-1
      clusters: [standalone]
      roles: []

# Namespaces with typical configuration
namespaces: !system/component
  system/component-kind: pulsar/namespaces
  _: !system/local-ref tenants
  admin: !system/local-ref admin
  namespaces:
    - namespace: tenant-1/namespace-1
      config:
        post:
          autoTopicCreation:
            allowAutoTopicCreation: false
            defaultNumPartitions: 1
            topicType: string
          encryptionRequired: false
          isAllowAutoUpdateSchema: false
          schemaValidationEnforced: true
        put:
          schemaCompatibilityStrategy: FULL

# Schemas (customize with your own schema files)
schemas: !system/component
  system/component-kind: pulsar/schemas
  command:
    schema: avro/command.avsc.json
    type: AVRO

# Topics
topics: !system/component
  system/component-kind: pulsar/topics
  _: !system/local-ref namespaces
  admin: !system/local-ref admin
  schemas: !system/local-ref schemas
  topics:
    - topic: persistent://tenant-1/namespace-1/topic-1
      partitions: 1
      schema: !keyword command

# Crypto components (optional - for encrypted messaging)
crypto-key-pair-file-readers: !system/component
  system/component-kind: pulsar/crypto-key-pair-file-readers
  reader1:
    tenant-key-1:
      private-key: pulsar/test_rsa_privkey.pem
      public-key: pulsar/test_rsa_pubkey.pem

crypto-key-readers: !system/component
  system/component-kind: pulsar/crypto-key-readers
  reader1:
    default-key: tenant-key-1
    keys: !system/local-ref crypto-key-pair-file-readers.reader1

crypto-key-pair-generator: !system/component
  system/component-kind: pulsar/crypto-key-pair-generator
  tenant-key-1:
    algorithm: RSA
    key-size: 512

# Producer (with optional crypto)
producer: !system/component
  system/component-kind: pulsar/producer
  _: !system/local-ref topics
  client: !system/local-ref client
  conf:
    schema: !pulsar/schema AUTO_PRODUCE_BYTES
    topicName: "persistent://tenant-1/namespace-1/topic-1"
    # Uncomment for encrypted messaging:
    # cryptoKeyReader: !system/local-ref crypto-key-readers.reader1
    # encryptionKeys: [tenant-key-1]
  schemas: !system/local-ref schemas

# Consumer
consumer: !system/component
  system/component-kind: pulsar/consumer
  _: !system/local-ref topics
  client: !system/local-ref client
  conf:
    schema: !pulsar/schema AUTO_CONSUME
    subscriptionName: "test-subscription"
    topicNames: ["persistent://tenant-1/namespace-1/topic-1"]
    # Uncomment for encrypted messaging:
    # cryptoFailureAction: !pulsar/crypto-failure-action CONSUME
    # cryptoKeyReader: !system/local-ref crypto-key-readers.reader1
  schemas: !system/local-ref schemas

# Consumers (multiple)
consumers: !system/component
  system/component-kind: pulsar/consumers
  consumer1:
    _: !system/local-ref topics
    client: !system/local-ref client
    conf:
      schema: !pulsar/schema AUTO_CONSUME
      subscriptionName: "test-subscription-1"
      subscriptionType: !pulsar/subscription-type Shared
      topicNames: ["persistent://tenant-1/namespace-1/topic-1"]
    schemas: !system/local-ref schemas

# Reader
reader: !system/component
  system/component-kind: pulsar/reader
  _: !system/local-ref topics
  client: !system/local-ref client
  conf:
    schema: !pulsar/schema AUTO_CONSUME
    startMessageId: !pulsar/message-id earliest
    topicNames: ["persistent://tenant-1/namespace-1/topic-1"]
    # Uncomment for encrypted messaging:
    # cryptoFailureAction: !pulsar/crypto-failure-action CONSUME
    # cryptoKeyReader: !system/local-ref crypto-key-readers.reader1
  schemas: !system/local-ref schemas
