syntax = "proto2";

package com.repldriven.mono.test_schemas.pets;

import "record_metadata_options.proto";

option java_outer_classname = "PetProto";

message Pet {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string pet_id = 1 [(com.apple.foundationdb.record.field).primary_key = true];
  optional string name = 2;
  optional string species = 3;
  optional int64 age_months = 4;
}
