system:
  pubsub:
    container:
      exposed-ports: [6650, 8080]

    container-service-port:
      container: !system/local-ref container
      exposed-port: 6650

    container-service-url:
      port: !system/local-ref container-service-port
      scheme: pulsar

    container-service-http-port:
      container: !system/local-ref container
      exposed-port: 8080

    container-service-http-url:
      port: !system/local-ref container-service-http-port
      scheme: http

    client:
      service-url: !system/local-ref container-service-url

    admin:
      service-http-url: !system/local-ref container-service-http-url

    schemas:
      user:
        schema: schema-avro/user.avsc.json
        type: AVRO

    tenants:
      admin: !system/local-ref admin
      tenants:
        - tenant: tenant-1
          clusters: [standalone]
          roles: []

    namespaces:
      _: !system/local-ref tenants
      admin: !system/local-ref admin
      namespaces:
        - namespace: "tenant-1/namespace-1"
          config:
            post: !strs
              autoTopicCreation:
                allowAutoTopicCreation: false
                defaultNumPartitions: 1
                topicType: string
              encryptionRequired: true
              isAllowAutoUpdateSchema: false
              schemaValidationEnforced: true
            put: !strs
              schemaCompatibilityStrategy: FULL

    topics:
      _: !system/local-ref namespaces
      admin: !system/local-ref admin
      schemas: !system/local-ref schemas
      topics:
        - topic: "persistent://tenant-1/namespace-1/topic-1"
          partitions: 1
          schema: !keyword user

    crypto-key-pair-file-readers:
      p1:
        !str tenant-key-1:
          private-key: pubsub/test_rsa_privkey.pem
          public-key: pubsub/test_rsa_pubkey.pem
      p2:
        !str tenant-key-2:
          private-key: pubsub/test_rsa_privkey.pem
          public-key: pubsub/test_rsa_pubkey.pem

    crypto-key-readers:
      r1:
        default-key: tenant-key-1
        keys: !system/local-ref crypto-key-pair-file-readers.p1
      r2:
        default-key: tenant-key-2
        keys: !system/local-ref crypto-key-pair-file-readers.p2

    crypto-key-pair-generator:
      tenant-key-1:
        algorithm: RSA
        key-size: 512

    producer:
      _: !system/local-ref topics
      client: !system/local-ref client
      conf: !strs
        cryptoKeyReader: !system/local-ref crypto-key-readers.r1
        encryptionKeys: [tenant-key-1]
        schema: !pubsub/schema AUTO_PRODUCE_BYTES
        topicName: "persistent://tenant-1/namespace-1/topic-1"
      schemas: !system/local-ref schemas

    consumers:
      c1:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf: !strs
          cryptoFailureAction: !pubsub/crypto-failure-action CONSUME
          cryptoKeyReader: !system/local-ref crypto-key-readers.r1
          schema: !pubsub/schema AUTO_CONSUME
          subscriptionName: tenant-1-subscriber
          subscriptionType: !pubsub/subscription-type Shared
          topicNames: ["persistent://tenant-1/namespace-1/topic-1"]
        schemas: !system/local-ref schemas
      c2:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf: !strs
          cryptoFailureAction: !pubsub/crypto-failure-action CONSUME
          cryptoKeyReader: !system/local-ref crypto-key-readers.r2
          schema: !pubsub/schema AUTO_CONSUME
          subscriptionName: tenant-2-subscriber
          subscriptionType: !pubsub/subscription-type Shared
          topicNames: ["persistent://tenant-1/namespace-1/topic-1"]
        schemas: !system/local-ref schemas
