container: !system/component
  system/component-kind: mqtt/container
  exposed-port: 1883

container-connection-uri: !system/component
  system/component-kind: mqtt/container-connection-uri
  container-mapped-ports: !system/local-ref container-mapped-ports
  exposed-port: 1883

container-mapped-ports: !system/component
  system/component-kind: mqtt/container-mapped-ports
  container: !system/local-ref container

client: !system/component
  system/component-kind: mqtt/client
  options: {}
  uri: !system/local-ref container-connection-uri

producers: !system/component
  system/component-kind: mqtt/producers
  command:
    client: !system/local-ref client
    conf:
      topic: "test/commands"
      qos: 0
  reply:
    client: !system/local-ref client
    conf:
      topic: "test/replies"
      qos: 0

consumers: !system/component
  system/component-kind: mqtt/consumers
  command:
    client: !system/local-ref client
    conf:
      topic: "test/commands"
      qos: 0
  reply:
    client: !system/local-ref client
    conf:
      topic: "test/replies"
      qos: 0
