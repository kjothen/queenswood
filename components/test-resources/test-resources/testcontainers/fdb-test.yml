container: !system/component
  system/component-kind: fdb/container

cluster-file-path: !system/component
  system/component-kind: fdb/cluster-file-path
  container: !system/local-ref container

db: !system/component
  system/component-kind: fdb/db
  cluster-file-path: !system/local-ref cluster-file-path
  record-db: !system/local-ref record-db

record-db: !system/component
  system/component-kind: fdb/record-db
  cluster-file-path: !system/local-ref cluster-file-path

store: !system/component
  system/component-kind: fdb/store
  descriptor: com.repldriven.mono.schema.schemas.SchemaProto
  record-types: !strs
    persons:
      record-type: Person
      indexes:
        - name: email_idx
          field: email
    accounts:
      record-type: Account
      indexes:
        - name: customer_id_idx
          field: customer_id
    organizations:
      record-type: Organization
      indexes: []
    api-keys:
      record-type: ApiKey
      indexes:
        - name: ApiKey_by_org
          field: org_id
        - name: ApiKey_by_hash
          field: key_hash

meta-store: !system/component
  system/component-kind: fdb/meta-store
  record-db: !system/local-ref record-db
  path: meta
  descriptor: com.repldriven.mono.schema.schemas.SchemaProto
  record-types: !strs
    persons:
      record-type: Person
      indexes:
        - name: email_idx
          field: email
    accounts:
      record-type: Account
      indexes:
        - name: customer_id_idx
          field: customer_id
    organizations:
      record-type: Organization
      indexes: []
    api-keys:
      record-type: ApiKey
      indexes:
        - name: ApiKey_by_org
          field: org_id
        - name: ApiKey_by_hash
          field: key_hash
