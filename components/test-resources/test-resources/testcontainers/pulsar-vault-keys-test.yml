# Vault container pre-seeded with Pulsar tenant encryption keys for testing.
# Only tenant-1 keys are seeded — tenant-2 has none, simulating a wrong-tenant
# decrypt failure when consumer-2 tries to read messages encrypted for tenant-1.

container: !system/component
  system/component-kind: vault/container
  exposed-ports: [8200]
  vault-token: my-root-token
  init-commands:
    - "kv put secret/tenants/tenant-1/keys/tenant-key-1  "

container-api-port: !system/component
  system/component-kind: vault/container-api-port
  container: !system/local-ref container
  exposed-port: 8200

container-api-url: !system/component
  system/component-kind: vault/container-api-url
  port: !system/local-ref container-api-port
  scheme: http

client: !system/component
  system/component-kind: vault/client
  api-url: !system/local-ref container-api-url
