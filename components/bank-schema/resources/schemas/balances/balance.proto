syntax = "proto2";

package com.repldriven.mono.schemas.balances;

import "record_metadata_options.proto";
import "schemas/types/product-type.proto";

option java_outer_classname = "BalanceProto";

enum BalanceType {
  BALANCE_TYPE_UNKNOWN = 0;
  BALANCE_TYPE_DEFAULT = 1;
  BALANCE_TYPE_INTEREST_ACCRUED = 2;
  BALANCE_TYPE_INTEREST_PAID = 3;
  BALANCE_TYPE_PURCHASE = 4;
  BALANCE_TYPE_CASH = 5;
  BALANCE_TYPE_SUSPENSE = 6;
  BALANCE_TYPE_INTEREST_PAYABLE = 7;
}

enum BalanceStatus {
  BALANCE_STATUS_UNKNOWN = 0;
  BALANCE_STATUS_POSTED = 1;
  BALANCE_STATUS_PENDING_INCOMING = 2;
  BALANCE_STATUS_PENDING_OUTGOING = 3;
}

message Balance {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string account_id = 1;
  required com.repldriven.mono.schemas.types.ProductType product_type = 2;
  required BalanceType balance_type = 3;
  required BalanceStatus balance_status = 4;
  required string currency = 5;
  optional int64 credit = 6;
  optional int64 debit = 7;
  optional int64 credit_carry = 8;
  required int64 created_at = 9;
  required int64 updated_at = 10;
}

message BalanceProduct {
  required BalanceType balance_type = 1;
  required BalanceStatus balance_status = 2;
}
