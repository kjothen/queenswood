syntax = "proto2";

package com.repldriven.mono.schemas.restrictions;

import "record_metadata_options.proto";
import "schemas/restrictions/limit.proto";
import "schemas/restrictions/policy.proto";

option java_outer_classname = "RestrictionsProto";

message Restrictions {
  option (com.apple.foundationdb.record.record).usage = RECORD;
  required string restrictions_id = 1 [(com.apple.foundationdb.record.field).primary_key = true];
  required string owner_id = 2;
  required string organization_id = 3;
  repeated Policy policies = 4;
  repeated Limit limits = 5;
  required int64 created_at = 6;
  required int64 updated_at = 7;
}
