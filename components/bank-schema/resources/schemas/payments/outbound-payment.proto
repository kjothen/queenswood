syntax = "proto2";

package com.repldriven.mono.schemas.payments;

import "record_metadata_options.proto";

option java_outer_classname = "OutboundPaymentProto";

enum OutboundPaymentStatus {
  OUTBOUND_PAYMENT_STATUS_UNKNOWN = 0;
  OUTBOUND_PAYMENT_STATUS_PENDING = 1;
  OUTBOUND_PAYMENT_STATUS_PROCESSING = 2;
  OUTBOUND_PAYMENT_STATUS_COMPLETED = 3;
  OUTBOUND_PAYMENT_STATUS_FAILED = 4;
}

message OutboundPayment {
  option (com.apple.foundationdb.record.record).usage = RECORD;
  required string payment_id = 1 [(com.apple.foundationdb.record.field).primary_key = true];
  required string idempotency_key = 2;
  required string scheme = 3;
  required string debtor_account_id = 4;
  required string creditor_bban = 5;
  required string creditor_name = 6;
  required string currency = 7;
  required int64 amount = 8;
  required OutboundPaymentStatus payment_status = 9;
  required string transaction_id = 10;
  optional string reference = 11;
  optional string cancellation_code = 12;
  optional string cancellation_reason = 13;
  required int64 created_at = 14;
  optional int64 updated_at = 15;
}
