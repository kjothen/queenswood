syntax = "proto2";

package com.repldriven.mono.schemas.payments;

import "record_metadata_options.proto";

option java_outer_classname = "InboundPaymentProto";

message InboundPayment {
  option (com.apple.foundationdb.record.record).usage = RECORD;
  required string payment_id = 1 [(com.apple.foundationdb.record.field).primary_key = true];
  required string scheme_transaction_id = 2;
  required string end_to_end_id = 3;
  required string scheme = 4;
  required string creditor_account_id = 5;
  required string currency = 6;
  required int64 amount = 7;
  required string transaction_id = 8;
  optional string debtor_name = 9;
  optional string reference = 10;
  required int64 created_at = 11;
  required int64 updated_at = 12;
}
