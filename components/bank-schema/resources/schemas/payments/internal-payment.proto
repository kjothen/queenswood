syntax = "proto2";

package com.repldriven.mono.schemas.payments;

import "record_metadata_options.proto";

option java_outer_classname = "InternalPaymentProto";

message InternalPayment {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string payment_id          = 1 [(com.apple.foundationdb.record.field).primary_key = true];
  required string idempotency_key     = 2;
  required string debtor_account_id   = 3;
  required string creditor_account_id = 4;
  required string currency            = 5;
  required int64  amount              = 6;
  required string transaction_id      = 7;
  optional string reference           = 8;
  required int64  created_at          = 9;
  required int64  updated_at          = 10;
}
