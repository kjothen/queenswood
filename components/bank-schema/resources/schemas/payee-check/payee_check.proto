syntax = "proto2";

package com.repldriven.mono.schemas.payee_check;

import "record_metadata_options.proto";
import "schemas/cash-accounts/account.proto";

option java_outer_classname = "PayeeCheckProto";

enum MatchResult {
  MATCH_RESULT_UNKNOWN     = 0;
  MATCH_RESULT_MATCH       = 1;
  MATCH_RESULT_CLOSE_MATCH = 2;
  MATCH_RESULT_NO_MATCH    = 3;
  MATCH_RESULT_UNAVAILABLE = 4;
}

message AccountIdentifier {
  required string sort_code      = 1;
  required string account_number = 2;
}

message PayeeCheckRequest {
  required string            creditor_name = 1;
  required AccountIdentifier account       = 2;
  required com.repldriven.mono.schemas.cash_accounts.AccountType account_type = 3;
  optional string            requested_by  = 4;
}

message PayeeCheckResult {
  required MatchResult match_result = 1;
  optional string      actual_name  = 2;
  optional string      reason_code  = 3;
  optional string      reason       = 4;
}

message PayeeCheck {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string            check_id        = 1;
  required string            organization_id = 2;
  required PayeeCheckRequest request         = 3;
  required PayeeCheckResult  result          = 4;
  required string            created_at      = 5;
  required string            expires_at      = 6;
  optional string            adapter_ref     = 7;
}
