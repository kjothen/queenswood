syntax = "proto2";

package com.repldriven.mono.schemas.tiers;

import "record_metadata_options.proto";
import "schemas/tiers/policy.proto";
import "schemas/tiers/limit.proto";

option java_outer_classname = "TierProto";

enum TierType {
  TIER_TYPE_UNKNOWN  = 0;
  TIER_TYPE_SYSTEM   = 1;
  TIER_TYPE_MICRO    = 2;
  TIER_TYPE_STANDARD = 3;
}

message Tier {
  option (com.apple.foundationdb.record.record).usage = RECORD;
  required string   tier_id    = 1 [(com.apple.foundationdb.record.field).primary_key = true];
  required TierType tier_type  = 2;
  repeated com.repldriven.mono.schemas.tiers.Policy policies = 3;
  repeated com.repldriven.mono.schemas.tiers.Limit  limits   = 4;
  required int64    created_at = 5;
  required int64    updated_at = 6;
}
