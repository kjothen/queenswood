syntax = "proto2";

package com.repldriven.mono.schemas.tiers;

import "record_metadata_options.proto";
import "schemas/organizations/organization.proto";
import "schemas/tiers/policy.proto";
import "schemas/tiers/limit.proto";

option java_outer_classname = "TierProto";

message Tier {
  option (com.apple.foundationdb.record.record).usage = RECORD;
  required com.repldriven.mono.schemas.organizations.TierType tier_type = 1 [(com.apple.foundationdb.record.field).primary_key = true];
  repeated com.repldriven.mono.schemas.tiers.Policy policies = 2;
  repeated com.repldriven.mono.schemas.tiers.Limit  limits   = 3;
  required int64    created_at = 4;
  required int64    updated_at = 5;
}
