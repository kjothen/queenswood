syntax = "proto2";

package com.repldriven.mono.schemas.party;

import "record_metadata_options.proto";

option java_outer_classname = "PartyNationalIdentifierProto";

message PartyNationalIdentifier {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string organization_id = 6;
  required string party_id        = 1 [(com.apple.foundationdb.record.field).primary_key = true];
  required IdentifierType type    = 2;
  required string value           = 3;
  required string issuing_country = 4;
  required int64 created_at       = 5;

  enum IdentifierType {
    IDENTIFIER_TYPE_UNKNOWN = 0;
    IDENTIFIER_TYPE_NATIONAL_INSURANCE = 1;
    IDENTIFIER_TYPE_PASSPORT           = 2;
    IDENTIFIER_TYPE_DRIVING_LICENCE    = 3;
    IDENTIFIER_TYPE_NATIONAL_ID_CARD   = 4;
    IDENTIFIER_TYPE_TAX_ID             = 5;
  }
}
