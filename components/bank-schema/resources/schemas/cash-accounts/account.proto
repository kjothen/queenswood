syntax = "proto2";

package com.repldriven.mono.schemas.cash_accounts;

import "record_metadata_options.proto";
import "schemas/cash-account-products/account-product.proto";

option java_outer_classname = "CashAccountProto";

message ScanAddress {
  required string sort_code = 1;
  required string account_number = 2;
}

message PaymentAddress {
  required com.repldriven.mono.schemas.cash_account_products.PaymentAddressScheme scheme = 1;
  oneof identifier {
    ScanAddress scan = 2;
    string value = 3;
  }
}

enum AccountType {
  ACCOUNT_TYPE_UNKNOWN  = 0;
  ACCOUNT_TYPE_PERSONAL = 1;
  ACCOUNT_TYPE_BUSINESS = 2;
}

message CashAccount {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string organization_id = 8;
  required string account_id = 1;
  optional string party_id = 2;
  optional string name = 3;
  optional string currency = 4;
  required CashAccountStatus account_status = 5;
  optional int64 created_at = 6;
  optional int64 updated_at = 7;
  repeated PaymentAddress payment_addresses = 10;
  required string product_id = 11;
  required string version_id = 12;
  optional com.repldriven.mono.schemas.cash_account_products.ProductType product_type = 13;
  optional string bban            = 14;  // denormalised for indexing: sort_code + account_number
  optional AccountType account_type = 15;

  enum CashAccountStatus {
    CASH_ACCOUNT_STATUS_UNKNOWN = 0;
    CASH_ACCOUNT_STATUS_OPENING = 1;
    CASH_ACCOUNT_STATUS_OPENED = 2;
    CASH_ACCOUNT_STATUS_CLOSING = 3;
    CASH_ACCOUNT_STATUS_CLOSED = 4;
  }
}
