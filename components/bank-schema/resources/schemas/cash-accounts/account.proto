syntax = "proto2";

package com.repldriven.mono.schemas.cash_accounts;

import "record_metadata_options.proto";
import "schemas/cash-account-products/account-product.proto";
import "schemas/types/product-type.proto";

option java_outer_classname = "CashAccountProto";

message ScanAddress {
  required string sort_code = 1;
  required string account_number = 2;
}

message PaymentAddress {
  required com.repldriven.mono.schemas.cash_account_products.PaymentAddressScheme scheme = 1;
  // Sibling optional variants (no proto `oneof` wrapper) so the
  // protojure-deserialised Clojure shape matches the Avro response
  // shape directly — `{scheme, scan, value}`. Field tags 2/3 are
  // preserved for wire compatibility with any previously-written
  // records. Domain code is responsible for setting at most one.
  optional ScanAddress scan = 2;
  optional string value = 3;
}

enum AccountType {
  ACCOUNT_TYPE_UNKNOWN = 0;
  ACCOUNT_TYPE_PERSONAL = 1;
  ACCOUNT_TYPE_BUSINESS = 2;
}

message CashAccount {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string organization_id = 1;
  required string account_id = 2;
  required AccountType account_type = 3;
  required string party_id = 4;
  required string product_id = 5;
  required string version_id = 6;
  required com.repldriven.mono.schemas.types.ProductType product_type = 7;
  required string name = 8;
  required string currency = 9;
  required CashAccountStatus account_status = 10;
  repeated PaymentAddress payment_addresses = 11;
  optional string bban = 12; // denormalised for indexing: sort_code + account_number
  required int64 created_at = 13;
  required int64 updated_at = 14;

  enum CashAccountStatus {
    CASH_ACCOUNT_STATUS_UNKNOWN = 0;
    CASH_ACCOUNT_STATUS_OPENING = 1;
    CASH_ACCOUNT_STATUS_OPENED = 2;
    CASH_ACCOUNT_STATUS_CLOSING = 3;
    CASH_ACCOUNT_STATUS_CLOSED = 4;
  }
}
