syntax = "proto2";

package com.repldriven.mono.schemas.idv;

import "record_metadata_options.proto";

option java_outer_classname = "IdvProto";

message Idv {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string organization_id = 1;
  required string verification_id = 2;
  required string party_id = 3;
  required IdvStatus status = 4;
  required int64 created_at = 5;
  required int64 updated_at = 6;
  optional int64 completed_at = 7;

  enum IdvStatus {
    IDV_STATUS_UNKNOWN = 0;
    IDV_STATUS_PENDING = 1; // initiated, awaiting result
    IDV_STATUS_IN_REVIEW = 2; // escalated to manual review
    IDV_STATUS_ACCEPTED = 3;
    IDV_STATUS_REJECTED = 4; // data doesn't pass checks
    IDV_STATUS_FAILED = 5; // technical failure — can be retried
  }
}
