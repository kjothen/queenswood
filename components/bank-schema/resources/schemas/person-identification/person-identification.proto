syntax = "proto2";

package com.repldriven.mono.schemas.person_identification;

import "record_metadata_options.proto";

option java_outer_classname = "PersonIdentificationProto";

message PersonIdentification {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string party_id = 1 [(com.apple.foundationdb.record.field).primary_key = true];

  required string given_name = 2;
  optional string middle_names = 3;
  required string family_name = 4;
  required int32 date_of_birth = 5; // YYYYMMDD
  required string nationality = 6; // ISO 3166-1 alpha-2

  required int64 created_at = 8;
  required int64 updated_at = 9;
}
