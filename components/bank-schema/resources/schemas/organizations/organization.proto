syntax = "proto2";

package com.repldriven.mono.schemas.organizations;

import "record_metadata_options.proto";

option java_outer_classname = "OrganizationProto";

enum OrganizationType {
  ORGANIZATION_TYPE_UNKNOWN = 0;
  ORGANIZATION_TYPE_INTERNAL = 1;
  ORGANIZATION_TYPE_CUSTOMER = 2;
}

enum OrganizationStatus {
  ORGANIZATION_STATUS_UNKNOWN = 0;
  ORGANIZATION_STATUS_TEST = 1;
  ORGANIZATION_STATUS_LIVE = 2;
}

message Organization {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string organization_id = 1 [(com.apple.foundationdb.record.field).primary_key = true];
  required OrganizationType type = 2;
  required OrganizationStatus status = 3;
  optional string tier_id = 4;
  required string name = 5;
  required int64 created_at = 6;
  required int64 updated_at = 7;
}
