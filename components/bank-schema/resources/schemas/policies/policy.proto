// components/bank-schema/resources/com/repldriven/mono/schemas/policies/policy.proto
syntax = "proto2";

package com.repldriven.mono.schemas.policies;

import "record_metadata_options.proto";
import "schemas/amounts/amount.proto";
import "schemas/balances/balance.proto";
import "schemas/cash-accounts/account.proto";
import "schemas/organizations/organization.proto";
import "schemas/party/party.proto";
import "schemas/schemes/scheme.proto";
import "schemas/transactions/transaction.proto";
import "schemas/types/product-type.proto";

option java_outer_classname = "PolicyProto";

// ==========================================================================
// Policy category
// ==========================================================================

enum PolicyCategory {
  POLICY_CATEGORY_UNKNOWN = 0;
  POLICY_CATEGORY_STANDARD = 1;
  POLICY_CATEGORY_RESTRICTED = 2;
  POLICY_CATEGORY_EMERGENCY = 3;
}

// ==========================================================================
// Capabilities
// ==========================================================================

enum ApiKeyAction {
  API_KEY_ACTION_UNKNOWN = 0;
  API_KEY_ACTION_ISSUE = 1;
}

message ApiKeyCapability {
  required ApiKeyAction action = 1;
}

enum BalanceAction {
  BALANCE_ACTION_UNKNOWN = 0;
  BALANCE_ACTION_CREATE = 1;
  BALANCE_ACTION_APPLY = 2;
}

message BalanceCapabilityFilter {
  optional com.repldriven.mono.schemas.balances.BalanceType balance_type = 1;
  optional com.repldriven.mono.schemas.balances.BalanceStatus balance_status = 2;
}

message BalanceCapability {
  required BalanceAction action = 1;
  repeated BalanceCapabilityFilter filters = 2;
}

enum CashAccountAction {
  CASH_ACCOUNT_ACTION_UNKNOWN = 0;
  CASH_ACCOUNT_ACTION_OPEN = 1;
  CASH_ACCOUNT_ACTION_CLOSE = 2;
}

message CashAccountCapabilityFilter {
  optional com.repldriven.mono.schemas.cash_accounts.AccountType account_type = 1;
}

message CashAccountCapability {
  required CashAccountAction action = 1;
  repeated CashAccountCapabilityFilter filters = 2;
}

enum CashAccountProductAction {
  CASH_ACCOUNT_PRODUCT_ACTION_UNKNOWN = 0;
  CASH_ACCOUNT_PRODUCT_ACTION_DRAFT = 1;
  CASH_ACCOUNT_PRODUCT_ACTION_PUBLISH = 2;
}

message CashAccountProductCapabilityFilter {
  optional com.repldriven.mono.schemas.types.ProductType product_type = 1;
}

message CashAccountProductCapability {
  required CashAccountProductAction action = 1;
  repeated CashAccountProductCapabilityFilter filters = 2;
}

enum IdvAction {
  IDV_ACTION_UNKNOWN = 0;
  IDV_ACTION_SUBMIT = 1;
}

message IdvCapability {
  required IdvAction action = 1;
}

enum InboundPaymentAction {
  INBOUND_PAYMENT_ACTION_UNKNOWN = 0;
  INBOUND_PAYMENT_ACTION_RECEIVE = 1;
}

message InboundPaymentCapabilityFilter {
  optional com.repldriven.mono.schemas.schemes.SchemeType scheme = 1;
}

message InboundPaymentCapability {
  required InboundPaymentAction action = 1;
  repeated InboundPaymentCapabilityFilter filters = 2;
}

enum InternalPaymentAction {
  INTERNAL_PAYMENT_ACTION_UNKNOWN = 0;
  INTERNAL_PAYMENT_ACTION_SUBMIT = 1;
}

message InternalPaymentCapability {
  required InternalPaymentAction action = 1;
}

enum InterestAction {
  INTEREST_ACTION_UNKNOWN = 0;
  INTEREST_ACTION_ACCRUE = 1;
  INTEREST_ACTION_CAPITALIZE = 2;
}

message InterestCapability {
  required InterestAction action = 1;
}

enum OrganizationAction {
  ORGANIZATION_ACTION_UNKNOWN = 0;
  ORGANIZATION_ACTION_CREATE = 1;
}

message OrganizationCapabilityFilter {
  optional com.repldriven.mono.schemas.organizations.OrganizationType type = 1;
  optional com.repldriven.mono.schemas.organizations.OrganizationStatus status = 2;
}

message OrganizationCapability {
  required OrganizationAction action = 1;
  repeated OrganizationCapabilityFilter filters = 2;
}

enum OutboundPaymentAction {
  OUTBOUND_PAYMENT_ACTION_UNKNOWN = 0;
  OUTBOUND_PAYMENT_ACTION_SEND = 1;
}

message OutboundPaymentCapabilityFilter {
  optional com.repldriven.mono.schemas.schemes.SchemeType scheme = 1;
}

message OutboundPaymentCapability {
  required OutboundPaymentAction action = 1;
  repeated OutboundPaymentCapabilityFilter filters = 2;
}

enum PartyAction {
  PARTY_ACTION_UNKNOWN = 0;
  PARTY_ACTION_CREATE = 1;
}

message PartyCapabilityFilter {
  optional com.repldriven.mono.schemas.party.Party.PartyType type = 1;
  optional com.repldriven.mono.schemas.party.Party.PartyStatus status = 2;
}

message PartyCapability {
  required PartyAction action = 1;
  repeated PartyCapabilityFilter filters = 2;
}

enum PayeeCheckAction {
  PAYEE_CHECK_ACTION_UNKNOWN = 0;
  PAYEE_CHECK_ACTION_CHECK = 1;
}

message PayeeCheckCapability {
  required PayeeCheckAction action = 1;
}

enum PolicyAction {
  POLICY_ACTION_UNKNOWN = 0;
  POLICY_ACTION_CREATE = 1;
  POLICY_ACTION_BIND = 2;
}

message PolicyCapabilityFilter {
  optional PolicyCategory category = 1;
}

message PolicyCapability {
  required PolicyAction action = 1;
  repeated PolicyCapabilityFilter filters = 2;
}

enum TransactionAction {
  TRANSACTION_ACTION_UNKNOWN = 0;
  TRANSACTION_ACTION_CREATE = 1;
}

message TransactionCapability {
  required TransactionAction action = 1;
}

enum Effect {
  EFFECT_UNKNOWN = 0;
  EFFECT_ALLOW = 1;
  EFFECT_DENY = 2;
}

message Capability {
  required Effect effect = 1;
  optional string reason = 2;

  oneof kind {
    ApiKeyCapability api_key = 101;
    BalanceCapability balance = 102;
    CashAccountCapability cash_account = 103;
    CashAccountProductCapability cash_account_product = 104;
    IdvCapability idv = 105;
    InboundPaymentCapability inbound_payment = 106;
    InternalPaymentCapability internal_payment = 107;
    InterestCapability interest = 108;
    OrganizationCapability organization = 109;
    OutboundPaymentCapability outbound_payment = 110;
    PartyCapability party = 111;
    PayeeCheckCapability payee_check = 112;
    PolicyCapability policy = 113;
    TransactionCapability transaction = 114;
  }
}

// ==========================================================================
// Limits
// ==========================================================================

enum TimeWindow {
  TIME_WINDOW_UNKNOWN = 0;
  TIME_WINDOW_INSTANT = 1;
  TIME_WINDOW_DAILY = 2;
  TIME_WINDOW_WEEKLY = 3;
  TIME_WINDOW_MONTHLY = 4;
  TIME_WINDOW_ROLLING = 5;
}

message AmountAggregate {
  required com.repldriven.mono.schemas.amounts.Amount value = 1;
  required TimeWindow window = 2;
  optional int64 rolling_window_ms = 3;
}

message CountAggregate {
  optional int64 value = 1;
  required TimeWindow window = 2;
  optional int64 rolling_window_ms = 3;
}

message Aggregate {
  oneof kind {
    AmountAggregate amount = 1;
    CountAggregate count = 2;
  }
}

message MaxBound {
  required Aggregate aggregate = 1;
}
message MinBound {
  required Aggregate aggregate = 1;
}
message RangeBound {
  required Aggregate min = 1;
  required Aggregate max = 2;
}

message Bound {
  oneof kind {
    MaxBound max = 1;
    MinBound min = 2;
    RangeBound range = 3;
  }
}

enum LimitAllow {
  LIMIT_ALLOW_UNKNOWN = 0;
  LIMIT_ALLOW_IMPROVING = 1;
}

// --- Limit kinds (one per Capability variant) ---

message ApiKeyLimit {}

message ActualBalance {
  required com.repldriven.mono.schemas.balances.BalanceType type = 1;
  required com.repldriven.mono.schemas.balances.BalanceStatus status = 2;
}

message ComputedBalance {
  required string name = 1;
}

message BalanceLimitFilter {
  oneof kind {
    ActualBalance actual = 1;
    ComputedBalance computed = 2;
  }
  optional com.repldriven.mono.schemas.transactions.TransactionType transaction_type = 3;
}

message BalanceLimit {
  repeated BalanceLimitFilter filters = 1;
}

message CashAccountLimitFilter {
  optional com.repldriven.mono.schemas.types.ProductType product_type = 1;
  optional com.repldriven.mono.schemas.cash_accounts.AccountType account_type = 2;
  optional string currency = 3;
}

message CashAccountLimit {
  repeated CashAccountLimitFilter filters = 1;
}

message CashAccountProductLimitFilter {
  optional com.repldriven.mono.schemas.types.ProductType product_type = 1;
}

message CashAccountProductLimit {
  repeated CashAccountProductLimitFilter filters = 1;
}

message IdvLimit {}

message InboundPaymentLimitFilter {
  optional com.repldriven.mono.schemas.schemes.SchemeType scheme = 1;
}

message InboundPaymentLimit {
  repeated InboundPaymentLimitFilter filters = 1;
}

message InternalPaymentLimit {}

message InterestLimit {}

message OrganizationLimitFilter {
  optional com.repldriven.mono.schemas.organizations.OrganizationType type = 1;
  optional com.repldriven.mono.schemas.organizations.OrganizationStatus status = 2;
}

message OrganizationLimit {
  repeated OrganizationLimitFilter filters = 1;
}

message OutboundPaymentLimitFilter {
  optional com.repldriven.mono.schemas.schemes.SchemeType scheme = 1;
}

message OutboundPaymentLimit {
  repeated OutboundPaymentLimitFilter filters = 1;
}

message PartyLimitFilter {
  optional com.repldriven.mono.schemas.party.Party.PartyType type = 1;
  optional com.repldriven.mono.schemas.party.Party.PartyStatus status = 2;
}

message PartyLimit {
  repeated PartyLimitFilter filters = 1;
}

message PayeeCheckLimit {}

message PolicyLimitFilter {
  optional PolicyCategory category = 1;
}

message PolicyLimit {
  repeated PolicyLimitFilter filters = 1;
}

message TransactionLimit {}

message Limit {
  oneof kind {
    ApiKeyLimit api_key = 1;
    BalanceLimit balance = 2;
    CashAccountLimit cash_account = 3;
    CashAccountProductLimit cash_account_product = 4;
    IdvLimit idv = 5;
    InboundPaymentLimit inbound_payment = 6;
    InternalPaymentLimit internal_payment = 7;
    InterestLimit interest = 8;
    OrganizationLimit organization = 9;
    OutboundPaymentLimit outbound_payment = 10;
    PartyLimit party = 11;
    PayeeCheckLimit payee_check = 12;
    PolicyLimit policy = 13;
    TransactionLimit transaction = 14;
  }

  required Bound bound = 15;
  optional string reason = 16;
  optional LimitAllow allow = 17;
}

// ==========================================================================
// Policy
// ==========================================================================

message Policy {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string policy_id = 1 [(com.apple.foundationdb.record.field).primary_key = true];

  optional string name = 2;
  optional string description = 3;
  required bool enabled = 4;

  required PolicyCategory category = 5;
  repeated Capability capabilities = 6;
  repeated Limit limits = 7;

  map<string, string> labels = 8;

  required int64 created_at = 9;
  required int64 updated_at = 10;
}

// ==========================================================================
// Target
// ==========================================================================
message PlatformTarget {}

message OrganizationTarget {
  required string organization_id = 1;
}

message PartyTarget {
  optional string party_id = 1;
}

message AccountTarget {
  oneof selector {
    string account_id = 1;
    com.repldriven.mono.schemas.cash_accounts.AccountType account_type = 3;
  }
}

message SchemeTarget {
  required com.repldriven.mono.schemas.schemes.SchemeType scheme = 1;
  optional string organization_id = 2;
}

message Target {
  oneof kind {
    PlatformTarget platform = 1;
    OrganizationTarget organization = 2;
    PartyTarget party = 3;
    AccountTarget account = 4;
    SchemeTarget scheme = 5;
  }
}

// ==========================================================================
// Policy binding
// ==========================================================================

message PolicyBinding {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string binding_id = 1 [(com.apple.foundationdb.record.field).primary_key = true];
  required string policy_id = 2;
  required Target target = 3;

  optional string reason = 4;
  required int64 created_at = 5;
}
