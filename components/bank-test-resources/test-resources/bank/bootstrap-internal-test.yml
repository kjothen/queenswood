internal: !system/component
  system/component-kind: bootstrap/internal
  record-db: !system/ref fdb.record-db
  record-store: !system/ref fdb.meta-store
  tiers:
    system:
      policies: !include bank/tiers/system/policies.yml
      limits: !include bank/tiers/system/limits.yml
    micro:
      policies: !include bank/tiers/micro/policies.yml
      limits: !include bank/tiers/micro/limits.yml
    standard:
      policies: !include bank/tiers/standard/policies.yml
      limits: !include bank/tiers/standard/limits.yml
  organization:
    name: Queenswood
    tier: !keyword tier-type-micro
  currencies: [GBP]
  balances:
    - balance-type: !keyword balance-type-default
      balance-status: !keyword balance-status-posted
      currency: GBP
      credit: 10000
      debit: 0
    - balance-type: !keyword balance-type-suspense
      balance-status: !keyword balance-status-posted
      currency: GBP
      credit: 0
      debit: 0
