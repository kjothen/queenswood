internal: !system/component
  system/component-kind: bootstrap/internal
  record-db: !system/ref fdb.record-db
  record-store: !system/ref fdb.meta-store
  system:
    restrictions:
      policies: !include bank/restrictions/system/policies.yml
      limits: !include bank/restrictions/system/limits.yml
  organization:
    name: Queenswood
    restrictions:
      policies: !include bank/restrictions/organization/internal/policies.yml
      limits: !include bank/restrictions/organization/internal/limits.yml
  currencies: [GBP]
  balances:
    - balance-type: !keyword balance-type-default
      balance-status: !keyword balance-status-posted
      currency: GBP
      credit: 10000
      debit: 0
    - balance-type: !keyword balance-type-suspense
      balance-status: !keyword balance-status-posted
      currency: GBP
      credit: 0
      debit: 0
